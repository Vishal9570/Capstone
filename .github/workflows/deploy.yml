name: Build and Deploy to Azure

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push backend image
        run: |
          az acr build --registry capstoneacr123 --image capstone-backend:latest -f Dockerfile.backend .

      - name: Build and push frontend image
        run: |
          az acr build --registry capstoneacr123 --image capstone-frontend:latest -f Dockerfile.frontend .

      - name: Restart backend app to pull new image
        run: az webapp restart --name capstone-backend-api --resource-group capstone-rg

      - name: Restart frontend app to pull new image
        run: az webapp restart --name capstone-frontend-ui --resource-group capstone-rg