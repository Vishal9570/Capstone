version: '3'

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: capstone-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - capstone-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: capstone-frontend
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      - capstone-net

  locust:
    image: locustio/locust:2.31.1
    container_name: capstone-locust
    volumes:
      - ./locustfile.py:/mnt/locust/locustfile.py
    command: -f /mnt/locust/locustfile.py --host=http://backend:8000
    ports:
      - "8089:8089"
    depends_on:
      - backend
    networks:
      - capstone-net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: capstone-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - capstone-net

  loki:
    image: grafana/loki:3.1.0
    container_name: capstone-loki
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    command:
      - "-config.file=/etc/loki/config.yml"
    ports:
      - "3100:3100"
    networks:
      - capstone-net

  promtail:
    image: grafana/promtail:3.1.0
    container_name: capstone-promtail
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/capstone:ro
      - promtail-positions:/var/lib/promtail
    command:
      - "-config.file=/etc/promtail/config.yml"
    depends_on:
      - loki
    networks:
      - capstone-net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: capstone-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - capstone-net

networks:
  capstone-net:
    driver: bridge

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
  promtail-positions:


